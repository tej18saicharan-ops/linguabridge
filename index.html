<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LinguaBridge — Multilingual AI Chat</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0f14; --surface: #161820; --panel: #1e2028;
      --border: #2a2d38; --border-bright: #3d4157;
      --text: #e8eaf0; --text-muted: #6b7080; --text-dim: #9099b0;
      --accent-a: #7c6ff7; --accent-a-glow: rgba(124,111,247,0.15);
      --accent-b: #2ec4b6; --accent-b-glow: rgba(46,196,182,0.15);
      --badge-bg: #252836; --radius: 12px; --radius-sm: 8px; --radius-msg: 16px;
    }
    body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }
    #root { height: 100vh; display: flex; flex-direction: column; }
    .header { display: flex; align-items: center; justify-content: space-between; padding: 14px 28px; border-bottom: 1px solid var(--border); background: var(--surface); flex-shrink: 0; }
    .logo { display: flex; align-items: center; gap: 10px; }
    .logo-icon { width: 36px; height: 36px; background: linear-gradient(135deg, var(--accent-a), var(--accent-b)); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
    .logo-text { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
    .logo-text span { color: var(--accent-a); }
    .status-pill { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-dim); background: var(--badge-bg); border: 1px solid var(--border); padding: 5px 12px; border-radius: 20px; }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; background: #4caf50; box-shadow: 0 0 6px #4caf50; }
    .status-dot.loading { background: #ff9800; box-shadow: 0 0 6px #ff9800; }
    .status-dot.error { background: #f44336; box-shadow: 0 0 6px #f44336; }
    .chat-layout { display: grid; grid-template-columns: 1fr 1fr; flex: 1; overflow: hidden; }
    .user-panel { display: flex; flex-direction: column; overflow: hidden; border-right: 1px solid var(--border); }
    .user-panel:last-child { border-right: none; }
    .panel-header { padding: 16px 20px 14px; border-bottom: 1px solid var(--border); background: var(--surface); flex-shrink: 0; }
    .panel-header-top { display: flex; align-items: center; justify-content: space-between; }
    .user-badge { display: flex; align-items: center; gap: 8px; }
    .user-avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; }
    .avatar-a { background: var(--accent-a-glow); border: 1px solid var(--accent-a); color: var(--accent-a); }
    .avatar-b { background: var(--accent-b-glow); border: 1px solid var(--accent-b); color: var(--accent-b); }
    .user-name { font-size: 14px; font-weight: 600; }
    .name-a { color: var(--accent-a); }
    .name-b { color: var(--accent-b); }
    .lang-select { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text-dim); }
    .lang-select select { background: var(--panel); border: 1px solid var(--border); color: var(--text); font-size: 12px; padding: 4px 8px; border-radius: 6px; outline: none; cursor: pointer; }
    .messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; background: var(--bg); }
    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-muted); text-align: center; gap: 8px; padding: 2rem; }
    .empty-icon { font-size: 32px; opacity: 0.4; }
    .empty-text { font-size: 13px; line-height: 1.5; }
    .message-bubble { max-width: 85%; animation: fadeIn 0.2s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; } }
    .message-bubble.sent { align-self: flex-end; }
    .message-bubble.received { align-self: flex-start; }
    .bubble-original { padding: 10px 14px; border-radius: var(--radius-msg); font-size: 14px; line-height: 1.5; word-break: break-word; }
    .sent .bubble-original { background: var(--accent-a-glow); border: 1px solid rgba(124,111,247,0.3); border-bottom-right-radius: 4px; }
    .received .bubble-original { background: var(--panel); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
    .bubble-translation { margin-top: 4px; padding: 8px 14px; border-radius: var(--radius-msg); font-size: 13px; line-height: 1.5; color: var(--text-dim); border: 1px dashed var(--border); word-break: break-word; }
    .sent .bubble-translation { border-bottom-right-radius: 4px; }
    .received .bubble-translation { border-bottom-left-radius: 4px; }
    .bubble-meta { display: flex; align-items: center; gap: 6px; margin-top: 4px; font-size: 10px; color: var(--text-muted); }
    .sent .bubble-meta { justify-content: flex-end; }
    .lang-tag { padding: 1px 6px; background: var(--badge-bg); border: 1px solid var(--border); border-radius: 4px; font-size: 10px; color: var(--text-dim); }
    .typing-indicator { display: flex; align-items: center; gap: 4px; padding: 10px 14px; background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius-msg); border-bottom-left-radius: 4px; width: fit-content; }
    .typing-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text-muted); animation: bounce 1.2s infinite; }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-4px)} }
    .input-area { padding: 14px 16px; border-top: 1px solid var(--border); background: var(--surface); flex-shrink: 0; }
    .input-row { display: flex; gap: 8px; align-items: flex-end; }
    .input-row textarea { flex: 1; background: var(--panel); border: 1px solid var(--border); color: var(--text); font-size: 14px; padding: 10px 14px; border-radius: var(--radius-sm); outline: none; resize: none; max-height: 100px; font-family: inherit; line-height: 1.5; }
    .input-row textarea:focus { border-color: var(--border-bright); }
    .input-row textarea::placeholder { color: var(--text-muted); }
    .send-btn { width: 40px; height: 40px; border-radius: var(--radius-sm); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
    .send-btn:active { transform: scale(0.95); }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .send-btn-a { background: var(--accent-a); }
    .send-btn-b { background: var(--accent-b); }
    .input-hint { font-size: 11px; color: var(--text-muted); margin-top: 6px; }
    @media (max-width: 600px) {
      .chat-layout { grid-template-columns: 1fr; grid-template-rows: 1fr 1fr; }
      .user-panel { border-right: none; border-bottom: 1px solid var(--border); }
    }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const LANGUAGES = [
  "English","Hindi","Spanish","French","German","Japanese",
  "Chinese","Arabic","Portuguese","Russian","Korean","Italian",
  "Tamil","Telugu","Kannada","Bengali","Marathi"
];

const API_BASE = "";

function App() {
  const [messages, setMessages] = useState([]);
  const [status, setStatus] = useState("ready");
  const [langA, setLangA] = useState("English");
  const [langB, setLangB] = useState("Hindi");
  const [inputA, setInputA] = useState("");
  const [inputB, setInputB] = useState("");
  const [translatingA, setTranslatingA] = useState(false);
  const [translatingB, setTranslatingB] = useState(false);
  const lastTimestamp = useRef(Date.now() - 5000);
  const messagesEndA = useRef(null);
  const messagesEndB = useRef(null);

  useEffect(() => {
    const poll = async () => {
      try {
        const res = await fetch(`${API_BASE}/api/messages?since=${lastTimestamp.current}`);
        if (!res.ok) return;
        const newMsgs = await res.json();
        if (newMsgs.length > 0) {
          lastTimestamp.current = Math.max(...newMsgs.map(m => m.timestamp));
          setMessages(prev => [...prev, ...newMsgs]);
          setTranslatingA(false);
          setTranslatingB(false);
          setStatus("ready");
        }
      } catch (e) { setStatus("error"); }
    };
    const id = setInterval(poll, 1500);
    return () => clearInterval(id);
  }, []);

  useEffect(() => {
    messagesEndA.current?.scrollIntoView({ behavior: "smooth" });
    messagesEndB.current?.scrollIntoView({ behavior: "smooth" });
  }, [messages, translatingA, translatingB]);

  const sendMessage = useCallback(async (sender, text, targetLang, setInput, setTranslating) => {
    if (!text.trim()) return;
    setTranslating(true);
    setInput("");
    setStatus("translating");
    try {
      const res = await fetch(`${API_BASE}/api/translate`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ sender, text, targetLang })
      });
      const msg = await res.json();
      if (msg.error) throw new Error(msg.error);
      await fetch(`${API_BASE}/api/messages`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(msg)
      });
    } catch (e) {
      setTranslating(false);
      setStatus("error");
    }
  }, []);

  const handleKeyA = e => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage("userA", inputA, langB, setInputA, setTranslatingA); } };
  const handleKeyB = e => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage("userB", inputB, langA, setInputB, setTranslatingB); } };
  const formatTime = ts => new Date(ts).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });

  const dotClass = status === "translating" ? "loading" : status === "error" ? "error" : "";
  const statusLabel = status === "translating" ? "Translating…" : status === "error" ? "Error" : "Ready";

  const renderMessages = (forUser) => {
    const isA = forUser === "userA";
    const isTranslating = isA ? translatingA : translatingB;
    return (
      <div className="messages">
        {messages.length === 0 && !isTranslating && (
          <div className="empty-state">
            <div className="empty-icon">💬</div>
            <div className="empty-text">Type a message in any language.<br/>{isA ? `User B will see it in ${langB}` : `User A will see it in ${langA}`}.</div>
          </div>
        )}
        {messages.map((msg, i) => {
          const isSender = msg.sender === forUser;
          return (
            <div key={i} className={`message-bubble ${isSender ? "sent" : "received"}`}>
              <div className="bubble-original">{isSender ? msg.originalText : msg.translatedText}</div>
              {!isSender && <div className="bubble-translation">🌐 {msg.originalText}</div>}
              <div className="bubble-meta">
                <span className="lang-tag">{isSender ? msg.detectedLang : msg.targetLang}</span>
                <span>{formatTime(msg.timestamp)}</span>
              </div>
            </div>
          );
        })}
        {isTranslating && (
          <div className="typing-indicator">
            <div className="typing-dot"/><div className="typing-dot"/><div className="typing-dot"/>
          </div>
        )}
        <div ref={isA ? messagesEndA : messagesEndB}/>
      </div>
    );
  };

  return (
    <>
      <div className="header">
        <div className="logo">
          <div className="logo-icon">🌐</div>
          <div className="logo-text">Lingua<span>Bridge</span></div>
        </div>
        <div className="status-pill">
          <div className={`status-dot ${dotClass}`}/>
          <span>{statusLabel}</span>
        </div>
      </div>
      <div className="chat-layout">
        <div className="user-panel">
          <div className="panel-header">
            <div className="panel-header-top">
              <div className="user-badge"><div className="user-avatar avatar-a">A</div><span className="user-name name-a">User A</span></div>
              <div className="lang-select"><span>Translates to</span><select value={langB} onChange={e => setLangB(e.target.value)}>{LANGUAGES.map(l => <option key={l}>{l}</option>)}</select></div>
            </div>
          </div>
          {renderMessages("userA")}
          <div className="input-area">
            <div className="input-row">
              <textarea rows={1} placeholder="Type in any language…" value={inputA} onChange={e => setInputA(e.target.value)} onKeyDown={handleKeyA} disabled={translatingA}/>
              <button className="send-btn send-btn-a" disabled={!inputA.trim() || translatingA} onClick={() => sendMessage("userA", inputA, langB, setInputA, setTranslatingA)}>➤</button>
            </div>
            <div className="input-hint">Enter to send · Shift+Enter for new line</div>
          </div>
        </div>
        <div className="user-panel">
          <div className="panel-header">
            <div className="panel-header-top">
              <div className="user-badge"><div className="user-avatar avatar-b">B</div><span className="user-name name-b">User B</span></div>
              <div className="lang-select"><span>Translates to</span><select value={langA} onChange={e => setLangA(e.target.value)}>{LANGUAGES.map(l => <option key={l}>{l}</option>)}</select></div>
            </div>
          </div>
          {renderMessages("userB")}
          <div className="input-area">
            <div className="input-row">
              <textarea rows={1} placeholder="Type in any language…" value={inputB} onChange={e => setInputB(e.target.value)} onKeyDown={handleKeyB} disabled={translatingB}/>
              <button className="send-btn send-btn-b" disabled={!inputB.trim() || translatingB} onClick={() => sendMessage("userB", inputB, langA, setInputB, setTranslatingB)}>➤</button>
            </div>
            <div className="input-hint">Enter to send · Shift+Enter for new line</div>
          </div>
        </div>
      </div>
    </>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
